{{- define "malsori.renderIngress" -}}
{{- $root := .root -}}
{{- $name := .name -}}
{{- $config := .config -}}
{{- $sharedPaths := get $config "paths" | default list -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}
  labels:
    {{- include "malsori.labels" $root | nindent 4 }}
  {{- with (get $config "annotations") }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- $className := or (get $config "ingressClassName") (get $config "className") }}
  {{- if $className }}
  ingressClassName: {{ $className }}
  {{- end }}
  rules:
    {{- range (get $config "hosts" | default list) }}
    {{- $hostEntry := . }}
    {{- $hostName := "" }}
    {{- $hostPaths := list }}
    {{- if kindIs "map" $hostEntry }}
      {{- $hostName = $hostEntry.host | default "" }}
      {{- if $hostEntry.paths }}
        {{- $hostPaths = $hostEntry.paths }}
      {{- end }}
    {{- else }}
      {{- $hostName = $hostEntry | default "" }}
    {{- end }}
    {{- if not $hostName }}
      {{- continue }}
    {{- end }}
    {{- if or (not $hostPaths) (eq (len $hostPaths) 0) }}
      {{- $hostPaths = $sharedPaths }}
    {{- end }}
    {{- if or (not $hostPaths) (eq (len $hostPaths) 0) }}
      {{- $hostPaths = list (dict "path" "/" "pathType" "Prefix" "servicePort" "web") }}
    {{- end }}
    - host: {{ $hostName }}
      http:
        paths:
          {{- range $hostPaths }}
          {{- $pathEntry := . }}
          {{- $pathValue := "/" }}
          {{- $pathType := "Prefix" }}
          {{- $servicePort := "web" }}
          {{- if kindIs "map" $pathEntry }}
            {{- $pathValue = $pathEntry.path | default "/" }}
            {{- $pathType = $pathEntry.pathType | default "Prefix" }}
            {{- $servicePort = $pathEntry.servicePort | default "web" }}
          {{- else }}
            {{- $pathValue = $pathEntry | default "/" }}
          {{- end }}
          - path: {{ $pathValue }}
            pathType: {{ $pathType }}
            backend:
              service:
                name: {{ include "malsori.fullname" $root }}
                port:
                  {{- if kindIs "string" $servicePort }}
                  name: {{ $servicePort }}
                  {{- else }}
                  number: {{ $servicePort }}
                  {{- end }}
          {{- end }}
    {{- end }}
  {{- with (get $config "tls") }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}

{{- $ingress := .Values.ingress | default dict -}}
{{- $public := get $ingress "public" | default dict -}}
{{- $internal := get $ingress "internal" | default dict -}}
{{- $publicEnabled := get $public "enabled" | default false -}}
{{- $internalEnabled := get $internal "enabled" | default false -}}
{{- $legacyEnabled := and (get $ingress "enabled" | default false) (not $publicEnabled) (not $internalEnabled) -}}

{{- if and $legacyEnabled (gt (len (get $ingress "hosts" | default list)) 0) }}
{{ include "malsori.renderIngress" (dict "root" . "name" (include "malsori.fullname" .) "config" $ingress) }}
{{- end }}

{{- if and $publicEnabled (gt (len (get $public "hosts" | default list)) 0) }}
---
{{ include "malsori.renderIngress" (dict "root" . "name" (include "malsori.fullname" .) "config" $public) }}
{{- end }}

{{- if and $internalEnabled (gt (len (get $internal "hosts" | default list)) 0) }}
---
{{ include "malsori.renderIngress" (dict "root" . "name" (printf "%s-internal" (include "malsori.fullname" .) | trunc 63 | trimSuffix "-") "config" $internal) }}
{{- end }}

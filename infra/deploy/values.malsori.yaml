replicaCount: 1

image:
  pythonApi:
    repository: registry.cube.local:5000/malsori/api-server
    tag: dev
    pullPolicy: Always
  webapp:
    repository: registry.cube.local:5000/malsori/webapp
    tag: dev
    pullPolicy: Always

service:
  type: ClusterIP
  pythonPort: 8000
  webPort: 80

pythonApi:
  deployment: cloud
  verifySsl: true
  debug: false
  # Create this Secret in the malsori namespace with the required env vars:
  # - PRONAIA_API_BASE
  # - PRONAIA_CLIENT_ID
  # - PRONAIA_CLIENT_SECRET
  # Optional (Drive auth broker):
  # - GOOGLE_OAUTH_CLIENT_ID
  # - GOOGLE_OAUTH_CLIENT_SECRET
  # - GOOGLE_OAUTH_REDIRECT_URI
  # - GOOGLE_OAUTH_SCOPES
  existingSecret: "malsori-python-api-secret"
  env:
    STT_STORAGE_BASE_DIR: /data
  # For Drive auth broker (refresh token) and persistent server-side state, back this with a PVC.
  # storage:
  #   enabled: true
  #   size: 1Gi
  resources: {}
  secretEnv: {}

webapp:
  apiBaseUrl: https://malsori.ancom.duckdns.org
  env: {}
  resources: {}

ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: malsori.ancom.duckdns.org
      paths:
        - path: /
          pathType: Prefix
          servicePort: web
        - path: /v1
          pathType: Prefix
          servicePort: python
  paths:
    - path: /
      pathType: Prefix
      servicePort: web
  tls:
    - hosts:
        - malsori.ancom.duckdns.org
      secretName: malsori-ancom-duckdns-org-tls

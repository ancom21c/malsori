<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/malsori-favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/malsori-favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#121616" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Malsori</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const standaloneQuery = window.matchMedia?.("(display-mode: standalone)");
        const isStandalone = () =>
          standaloneQuery?.matches === true || window.navigator.standalone === true;

        const applyViewportMetrics = () => {
          const viewport = window.visualViewport;
          const viewportHeight = viewport?.height ?? window.innerHeight;
          const offsetTop = viewport?.offsetTop ?? 0;
          const extraBottomInset = isStandalone()
            ? Math.max(0, window.innerHeight - (viewportHeight + offsetTop))
            : 0;

          document.documentElement.style.setProperty("--malsori-app-height", `${viewportHeight}px`);
          document.documentElement.style.setProperty("--malsori-system-bottom-inset", `${extraBottomInset}px`);
        };

        applyViewportMetrics();
        window.addEventListener("resize", applyViewportMetrics);
        window.addEventListener("orientationchange", applyViewportMetrics);
        standaloneQuery?.addEventListener?.("change", applyViewportMetrics);
        window.visualViewport?.addEventListener("resize", applyViewportMetrics);
        window.visualViewport?.addEventListener("scroll", applyViewportMetrics);
      })();
    </script>
    <script src="/config/malsori-config.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

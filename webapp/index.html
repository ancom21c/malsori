<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/malsori-favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/malsori-favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#121616" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Malsori</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const applyViewportHeight = () => {
          const viewportHeight = window.visualViewport?.height ?? window.innerHeight;
          document.documentElement.style.setProperty("--malsori-app-height", `${viewportHeight}px`);
        };

        applyViewportHeight();
        window.addEventListener("resize", applyViewportHeight);
        window.addEventListener("orientationchange", applyViewportHeight);
        window.visualViewport?.addEventListener("resize", applyViewportHeight);
      })();
    </script>
    <script src="/config/malsori-config.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
